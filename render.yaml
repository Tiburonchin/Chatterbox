services:
  - type: web
    name: chatterbox-upstream-service
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT upstream_api:app
    envVars:
      - key: UPSTREAM_API_TOKEN
        sync: false
      - key: CHATTERBOX_MODEL
        value: turbo
      - key: CHATTERBOX_DEVICE
        value: cpu
      - key: CHATTERBOX_LANGUAGE
        value: es
